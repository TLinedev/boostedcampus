<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boosted Campus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">Boosted Campus</div>
        <nav>
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">Classes</a>
            <a href="#" class="nav-link">Schedule</a>
            <a href="#" class="nav-link" id="settings-btn">Settings</a>
        </nav>
    </div>

    <div class="settings-overlay" id="settings-overlay"></div>
    
    <div class="settings-menu" id="settings-menu">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="close-btn" id="close-settings">&times;</button>
        </div>
        
        <div class="settings-tabs">
            <button class="tab-btn active" data-tab="free-themes">Free Themes</button>
            <button class="tab-btn" data-tab="paid-themes">
                Catppuccin Plus
                <span class="premium-badge">PLUS</span>
            </button>
        </div>

        <div class="settings-content">
            <div class="tab-content active" id="free-themes">
                <div class="settings-section">
                    <h3>Choose Your Theme</h3>
                    <div class="theme-options">
                        <button class="theme-btn" data-theme="light">
                            <span class="theme-preview light-preview"></span>
                            <span>Light</span>
                        </button>
                        <button class="theme-btn" data-theme="dark">
                            <span class="theme-preview dark-preview"></span>
                            <span>Dark</span>
                        </button>
                        <button class="theme-btn" data-theme="blue">
                            <span class="theme-preview blue-preview"></span>
                            <span>Ocean</span>
                        </button>
                        <button class="theme-btn" data-theme="purple">
                            <span class="theme-preview purple-preview"></span>
                            <span>Purple</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="tab-content" id="paid-themes">
                <div class="settings-section">
                    <div class="catppuccin-header">
                        <div class="catppuccin-logo">
                            <span class="catppuccin-icon">
                                <svg viewBox="0 0 24 24" width="36" height="36">
                                    <path fill="url(#gradient1)" d="M12 2C10.34 2 9 3.34 9 5C9 5.5 9.12 5.97 9.34 6.38C8.5 6.77 7.86 7.5 7.5 8.38C7.19 8.13 6.86 7.95 6.5 7.84C6.82 7.42 7 6.93 7 6.38C7 5.07 5.93 4 4.63 4C3.32 4 2.25 5.07 2.25 6.38C2.25 7.68 3.32 8.75 4.63 8.75C5.07 8.75 5.47 8.63 5.82 8.42C6.07 8.86 6.42 9.23 6.84 9.5C6.3 10.29 6 11.23 6 12.25C6 15.43 8.57 18 11.75 18C12.87 18 13.9 17.66 14.75 17.09C14.91 17.36 15.12 17.6 15.37 17.78C15.12 18.13 15 18.53 15 18.97C15 20.08 15.92 21 17.03 21C18.14 21 19.06 20.08 19.06 18.97C19.06 17.86 18.14 16.94 17.03 16.94C16.59 16.94 16.19 17.06 15.84 17.27C15.42 17 15.07 16.63 14.82 16.19C15.86 15.24 16.5 13.85 16.5 12.25C16.5 11.23 16.2 10.29 15.66 9.5C16.08 9.23 16.43 8.86 16.68 8.42C17.03 8.63 17.43 8.75 17.87 8.75C19.18 8.75 20.25 7.68 20.25 6.38C20.25 5.07 19.18 4 17.87 4C16.57 4 15.5 5.07 15.5 6.38C15.5 6.93 15.68 7.42 16 7.84C15.64 7.95 15.31 8.13 15 8.38C14.64 7.5 14 6.77 13.16 6.38C13.38 5.97 13.5 5.5 13.5 5C13.5 3.34 12.16 2 10.5 2H12Z"/>
                                    <defs>
                                        <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:1" />
                                            <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:1" />
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </span>
                            <div>
                                <h3>Catppuccin Plus</h3>
                                <p>Soothing pastel themes for the high-spirited!</p>
                            </div>
                        </div>
                        <span class="unlock-all-btn" id="unlock-all">Unlock All - $4.99</span>
                    </div>
                    <div class="theme-options">
                        <button class="theme-btn paid-theme" data-theme="ctp-latte" data-price="1.49">
                            <span class="lock-icon">🔒</span>
                            <span class="theme-preview ctp-latte-preview"></span>
                            <span>Latte</span>
                            <span class="flavor-desc">Light & Warm</span>
                            <span class="price-tag">$1.49</span>
                        </button>
                        <button class="theme-btn paid-theme" data-theme="ctp-frappe" data-price="1.49">
                            <span class="lock-icon">🔒</span>
                            <span class="theme-preview ctp-frappe-preview"></span>
                            <span>Frappé</span>
                            <span class="flavor-desc">Soft & Muted</span>
                            <span class="price-tag">$1.49</span>
                        </button>
                        <button class="theme-btn paid-theme" data-theme="ctp-macchiato" data-price="1.49">
                            <span class="lock-icon">🔒</span>
                            <span class="theme-preview ctp-macchiato-preview"></span>
                            <span>Macchiato</span>
                            <span class="flavor-desc">Rich & Cozy</span>
                            <span class="price-tag">$1.49</span>
                        </button>
                        <button class="theme-btn paid-theme" data-theme="ctp-mocha" data-price="1.49">
                            <span class="lock-icon">🔒</span>
                            <span class="theme-preview ctp-mocha-preview"></span>
                            <span>Mocha</span>
                            <span class="flavor-desc">Dark & Smooth</span>
                            <span class="price-tag">$1.49</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="purchase-modal" id="purchase-modal">
        <div class="purchase-modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-icon">
                <svg viewBox="0 0 24 24" width="60" height="60">
                    <path fill="url(#gradient2)" d="M12 2C10.34 2 9 3.34 9 5C9 5.5 9.12 5.97 9.34 6.38C8.5 6.77 7.86 7.5 7.5 8.38C7.19 8.13 6.86 7.95 6.5 7.84C6.82 7.42 7 6.93 7 6.38C7 5.07 5.93 4 4.63 4C3.32 4 2.25 5.07 2.25 6.38C2.25 7.68 3.32 8.75 4.63 8.75C5.07 8.75 5.47 8.63 5.82 8.42C6.07 8.86 6.42 9.23 6.84 9.5C6.3 10.29 6 11.23 6 12.25C6 15.43 8.57 18 11.75 18C12.87 18 13.9 17.66 14.75 17.09C14.91 17.36 15.12 17.6 15.37 17.78C15.12 18.13 15 18.53 15 18.97C15 20.08 15.92 21 17.03 21C18.14 21 19.06 20.08 19.06 18.97C19.06 17.86 18.14 16.94 17.03 16.94C16.59 16.94 16.19 17.06 15.84 17.27C15.42 17 15.07 16.63 14.82 16.19C15.86 15.24 16.5 13.85 16.5 12.25C16.5 11.23 16.2 10.29 15.66 9.5C16.08 9.23 16.43 8.86 16.68 8.42C17.03 8.63 17.43 8.75 17.87 8.75C19.18 8.75 20.25 7.68 20.25 6.38C20.25 5.07 19.18 4 17.87 4C16.57 4 15.5 5.07 15.5 6.38C15.5 6.93 15.68 7.42 16 7.84C15.64 7.95 15.31 8.13 15 8.38C14.64 7.5 14 6.77 13.16 6.38C13.38 5.97 13.5 5.5 13.5 5C13.5 3.34 12.16 2 10.5 2H12Z"/>
                    <defs>
                        <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h3>Unlock <span id="theme-name">Theme</span></h3>
            <p class="modal-price">Price: <span id="theme-price">$0.00</span></p>
            <p class="modal-description">Get access to this beautiful Catppuccin theme with soothing pastel colors!</p>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" id="cancel-purchase">Cancel</button>
                <button class="modal-btn purchase-btn" id="confirm-purchase">Purchase</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="classcard">
            <div class="classname">placeholder<br>20%</div>
        </div>
        <div class="classcard">
            <div class="classname">placeholder</div>
        </div>
    </div>

    <script>
        const settingsBtn = document.getElementById('settings-btn');
        const settingsMenu = document.getElementById('settings-menu');
        const settingsOverlay = document.getElementById('settings-overlay');
        const closeSettings = document.getElementById('close-settings');

        settingsBtn.addEventListener('click', (e) => {
            e.preventDefault();
            settingsMenu.classList.add('active');
            settingsOverlay.classList.add('active');
        });

        closeSettings.addEventListener('click', () => {
            settingsMenu.classList.remove('active');
            settingsOverlay.classList.remove('active');
        });

        settingsOverlay.addEventListener('click', () => {
            settingsMenu.classList.remove('active');
            settingsOverlay.classList.remove('active');
        });

        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;

                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(tabId).classList.add('active');
            });
        });

        const themeButtons = document.querySelectorAll('.theme-btn:not(.paid-theme)');
        const savedTheme = localStorage.getItem('theme') || 'light';
        const purchasedThemes = JSON.parse(localStorage.getItem('purchasedThemes')) || [];

        document.body.setAttribute('data-theme', savedTheme);

        themeButtons.forEach(btn => {
            if (btn.dataset.theme === savedTheme) {
                btn.classList.add('active');
            }

            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);

                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        const purchaseModal = document.getElementById('purchase-modal');
        const modalClose = document.getElementById('modal-close');
        const cancelPurchase = document.getElementById('cancel-purchase');
        const confirmPurchase = document.getElementById('confirm-purchase');
        const themeNameSpan = document.getElementById('theme-name');
        const themePriceSpan = document.getElementById('theme-price');

        let selectedPaidTheme = null;

        const paidThemeButtons = document.querySelectorAll('.paid-theme');

        function updatePaidThemeButtons() {
            paidThemeButtons.forEach(btn => {
                const theme = btn.dataset.theme;
                if (purchasedThemes.includes(theme)) {
                    btn.classList.add('unlocked');
                    btn.querySelector('.lock-icon').textContent = '✓';
                    btn.querySelector('.price-tag').textContent = 'Owned';
                    
                    if (theme === savedTheme) {
                        btn.classList.add('active');
                    }
                }
            });
        }

        updatePaidThemeButtons();

        paidThemeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                const price = btn.dataset.price;
                const themeName = btn.querySelector('span:nth-child(3)').textContent;

                if (purchasedThemes.includes(theme)) {
                    document.body.setAttribute('data-theme', theme);
                    localStorage.setItem('theme', theme);
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                } else {
                    selectedPaidTheme = { theme, price, themeName, button: btn };
                    themeNameSpan.textContent = themeName;
                    themePriceSpan.textContent = `$${price}`;
                    purchaseModal.classList.add('active');
                }
            });
        });

        modalClose.addEventListener('click', () => {
            purchaseModal.classList.remove('active');
        });

        cancelPurchase.addEventListener('click', () => {
            purchaseModal.classList.remove('active');
        });

        confirmPurchase.addEventListener('click', () => {
            if (selectedPaidTheme) {
                
                purchasedThemes.push(selectedPaidTheme.theme);
                localStorage.setItem('purchasedThemes', JSON.stringify(purchasedThemes));

                selectedPaidTheme.button.classList.add('unlocked');
                selectedPaidTheme.button.querySelector('.lock-icon').textContent = '✓';
                selectedPaidTheme.button.querySelector('.price-tag').textContent = 'Owned';

                document.body.setAttribute('data-theme', selectedPaidTheme.theme);
                localStorage.setItem('theme', selectedPaidTheme.theme);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                selectedPaidTheme.button.classList.add('active');

                purchaseModal.classList.remove('active');

                showToast(`Catppuccin ${selectedPaidTheme.themeName} unlocked!`);
            }
        });

        document.getElementById('unlock-all').addEventListener('click', () => {
            selectedPaidTheme = { theme: 'all', price: '4.99', themeName: 'All Catppuccin Plus Themes' };
            themeNameSpan.textContent = 'All Catppuccin Plus Themes';
            themePriceSpan.textContent = '$4.99';
            purchaseModal.classList.add('active');

            confirmPurchase.onclick = () => {
                const allThemes = ['ctp-latte', 'ctp-frappe', 'ctp-macchiato', 'ctp-mocha'];
                allThemes.forEach(theme => {
                    if (!purchasedThemes.includes(theme)) {
                        purchasedThemes.push(theme);
                    }
                });
                localStorage.setItem('purchasedThemes', JSON.stringify(purchasedThemes));
                updatePaidThemeButtons();
                purchaseModal.classList.remove('active');
                showToast('All Catppuccin Plus themes unlocked!');
            };
        });

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
