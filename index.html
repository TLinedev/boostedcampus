<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🚀 BoostedCampus</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  background: #1e293b;
  padding: 15px 25px;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: #3b82f6;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
}

.container {
  padding: 25px;
}

.login-box {
  max-width: 400px;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin: 40px auto;
}

.filter-box {
  max-width: 250px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.course-title {
  font-size: 18px;
  font-weight: bold;
}

.grade {
  font-size: 28px;
  margin: 10px 0;
}

.assignment-group {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.8;
}

.hidden {
  display: none;
}
</style>
</head>
<body>

<header>
  🚀 BoostedCampus
  <button onclick="fetchData()">Refresh</button>
</header>

<div class="container">

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <label>Canvas URL</label>
    <input id="canvasUrl" placeholder="https://school.instructure.com">

    <label>Canvas API Key</label>
    <input id="canvasToken" type="password" placeholder="Paste your API token">

    <button onclick="connect()">Connect</button>
  </div>

  <!-- FILTER (hidden until connected) -->
  <div class="filter-box hidden" id="filterBox">
    <label>Show Courses</label>
    <select id="statusFilter">
      <option value="all">All Courses</option>
      <option value="active">Active Courses</option>
      <option value="old">Old Courses</option>
    </select>
  </div>

  <!-- COURSES -->
  <div class="grid" id="courses"></div>

</div>

<script>
let canvasDomain = "";
let canvasToken = "";
let cachedCourses = [];

async function connect() {
  canvasDomain = document.getElementById("canvasUrl").value.trim();
  canvasToken = document.getElementById("canvasToken").value.trim();

  if (!canvasDomain || !canvasToken) {
    alert("Enter Canvas URL and API Key.");
    return;
  }

  await fetchData();

  // Hide login + show filter after successful connect
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("filterBox").classList.remove("hidden");
}

async function fetchData() {
  if (!canvasDomain || !canvasToken) return;

  const query = `
  query {
    allCourses {
      name
      assignmentGroups {
        name
        state
        gradesConnection {
          edges {
            node {
              currentGrade
            }
          }
        }
      }
    }
  }`;

  try {
    const response = await fetch("/api/proxy", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        canvasDomain,
        canvasToken,
        query
      })
    });

    const data = await response.json();

    if (data.errors) {
      alert("Canvas Error: " + data.errors[0].message);
      return;
    }

    cachedCourses = data.data.allCourses;
    renderCourses();

  } catch (err) {
    alert("Network/CORS Error: " + err.message);
  }
}

function renderCourses() {
  const container = document.getElementById("courses");
  container.innerHTML = "";

  const filter = document.getElementById("statusFilter").value;

  const filtered = cachedCourses.filter(course => {
    const hasActive = course.assignmentGroups?.some(g => g.state === "active");
    if (filter === "active") return hasActive;
    if (filter === "old") return !hasActive;
    return true;
  });

  filtered.forEach(course => {
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("div");
    title.className = "course-title";
    title.textContent = course.name;
    card.appendChild(title);

    let gradeText = "N/A";
    if (course.assignmentGroups?.length) {
      const gradeNode = course.assignmentGroups[0]?.gradesConnection?.edges[0]?.node;
      if (gradeNode?.currentGrade) {
        gradeText = gradeNode.currentGrade + "%";
      }
    }

    const grade = document.createElement("div");
    grade.className = "grade";
    grade.textContent = gradeText;
    card.appendChild(grade);

    container.appendChild(card);
  });
}

document.getElementById("statusFilter").addEventListener("change", renderCourses);
</script>

</body>
</html>
