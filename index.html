<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoostedCampus Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
  #controls { margin-bottom: 20px; }
  select { padding: 5px; }
  .course { background: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
</style>
</head>
<body>

<h1>🚀 BoostedCampus</h1>

<div id="controls">
  <label for="statusFilter">Show courses:</label>
  <select id="statusFilter">
    <option value="all">All Courses</option>
    <option value="active">Active Courses</option>
    <option value="old">Old Courses</option>
  </select>
</div>

<div id="coursesContainer">Loading courses...</div>

<script>
const canvasDomain = "yourschool.instructure.com"; // replace
const canvasToken = "YOUR_CANVAS_TOKEN"; // replace
const query = `query {
  allCourses {
    name
    state
  }
}`;

async function fetchCourses() {
  const res = await fetch("/api/proxy", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ domain: canvasDomain, token: canvasToken, query })
  });
  const data = await res.json();
  return data?.data?.allCourses || [];
}

function renderCourses(courses, filter) {
  const container = document.getElementById("coursesContainer");
  container.innerHTML = "";

  const filtered = courses.filter(c => {
    if(filter === "active") return c.state === "active";
    if(filter === "old") return c.state !== "active";
    return true; // all
  });

  if(filtered.length === 0) {
    container.textContent = "No courses to show.";
    return;
  }

  filtered.forEach(course => {
    const div = document.createElement("div");
    div.className = "course";
    div.textContent = `${course.name} (${course.state})`;
    container.appendChild(div);
  });
}

document.getElementById("statusFilter").addEventListener("change", async (e) => {
  const filter = e.target.value;
  renderCourses(window.coursesCache, filter);
});

(async () => {
  window.coursesCache = await fetchCourses();
  renderCourses(window.coursesCache, "all");
})();
</script>

</body>
</html>
